name: Debug Release (Obtainium)

# Builds an unsigned-for-release, debug-signed APK and publishes it as a GitHub
# prerelease so it can be installed/updated via Obtainium or sideloaded. Requires
# no signing secrets — the debug build type signs itself with the committed
# presentation/debug.keystore, and installs as dev.octoshrimpy.quik.debug
# alongside the release app.

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  debug-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Rename APK
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          mapfile -t apk_files < <(printf '%s\n' presentation/build/outputs/apk/debug/QUIK-v*-debug.apk)
          if [[ "${#apk_files[@]}" -eq 0 ]]; then
            echo "No APK found matching QUIK-v*-debug.apk" >&2
            exit 1
          fi
          if [[ "${#apk_files[@]}" -gt 1 ]]; then
            echo "Multiple APKs found: ${apk_files[*]}" >&2
            exit 1
          fi
          mv "${apk_files[0]}" presentation/build/outputs/apk/debug/QUIK-debug.apk

      - name: Remove previous debug prereleases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for tag in $(gh release list --json tagName -q '.[].tagName' | grep '^debug-build-' || true); do
            echo "Deleting old debug release: $tag"
            gh release delete "$tag" --cleanup-tag --yes || true
          done

      - name: Publish debug prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tag="debug-build-${{ github.run_number }}"
          gh release create "$tag" \
            presentation/build/outputs/apk/debug/QUIK-debug.apk \
            --prerelease \
            --title "Debug build ${{ github.run_number }}" \
            --notes "Automated debug build from \`${{ github.sha }}\` for testing.

          Installs as \`dev.octoshrimpy.quik.debug\` (app name \"QUIK-Debug\") alongside the release app.

          In Obtainium, add \`https://github.com/${{ github.repository }}\` and enable \"Include prereleases\"."
